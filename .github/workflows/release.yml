name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check version
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if release already exists
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$VERSION")

          if [ "$STATUS" = "404" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "New version v$VERSION — will create release"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Release v$VERSION already exists — skipping"
          fi

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            release/*.dmg
            release/*.zip
          retention-days: 5

  create-release:
    needs: [check-version, build-macos]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: release

      - name: Generate hashes and latest.json
        run: node scripts/generate-release-hash.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Check Yourself v${{ needs.check-version.outputs.version }}
          body: |
            ## Check Yourself v${{ needs.check-version.outputs.version }}

            Bug fixes and improvements.

            ### Installation
            1. Download the `.dmg` file for your Mac
            2. Open the DMG and drag **Check Yourself** to Applications
            3. Right-click the app → Open (first launch only, since the app is unsigned)

            ### Checksums
            See `hashes.txt` for SHA256 checksums.
          files: |
            release/*.dmg
            release/*.zip
            release/latest.json
            release/hashes.txt
          draft: false
          prerelease: false
